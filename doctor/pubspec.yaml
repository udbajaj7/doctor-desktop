name: doctor
description: A new Flutter project.

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 1.0.0+38

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^4.0.3
  flutter_login: ^4.1.1
  flutter_rating_bar: ^4.0.1
  intl_phone_field: ^3.1.0
  loader_overlay: ^2.2.0
  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.2
  day_picker: ^2.1.1
  flutter_time_picker_spinner: ^2.0.0
  scrollable_positioned_list: ^0.3.8
  drawerbehavior: ^2.2.1
  intl: ^0.18.0
  csc_picker:
  url_launcher: ^6.1.10
  introduction_screen: ^3.1.4
  http: ^0.13.4
  material_design_icons_flutter: ^6.0.7096
  weekday_selector: ^1.0.0
  intro_views_flutter: ^3.2.0
  dots_indicator: ^2.1.0
  smooth_page_indicator: ^1.0.0+2
  table_calendar: ^3.0.6
  flutter_spinkit: ^5.1.0
  tuple: ^2.0.0
  pull_to_refresh: ^2.0.0
  shared_preferences: ^2.2.2
  flutter_loading_button: ^0.0.2
  syncfusion_flutter_datepicker: ^20.4.52
  mailto: ^2.0.0
  flutter_phone_direct_caller: ^2.1.1
  flutter_emoji_feedback: ^0.1.2
  file_picker: ^5.5.0
  swipe_image_gallery: ^0.8.3
  gallery_image_viewer: ^1.2.0
  photo_view: ^0.14.0
  provider: ^6.1.1
  skeletonizer: ^0.8.0
  flutter_svg: ^1.1.6
  flutter_date_range_picker: ^0.0.14
  textfield_tags: ^2.0.2
  searchable_listview: ^2.8.0
  riverpod: ^2.4.6
  flutter_riverpod: ^2.4.6
  printing: ^5.10.4
  localstorage: ^4.0.1+4
  dropdown_search: ^7.0.0
  info_popup: ^4.3.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: 0.13.1
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.8
  riverpod_lint: ^2.1.1
  custom_lint: ^0.5.3

dependency_overrides:
  firebase_core_web: 2.10.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_grey_without_title.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/images/logo_grey_without_title.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/images/logo_grey_without_title.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/images/logo_grey_without_title.png"

  


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design:   true

  # To add assets to your application, add an assets section, like this:
